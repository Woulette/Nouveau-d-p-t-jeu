name: Découper les atlas pixel art

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'scripts/slice_assets.py'
      - 'official/assets/generated/**'
      - '.github/workflows/slice-assets.yml'

permissions:
  contents: write

jobs:
  slice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Installer Pillow
        run: python -m pip install --disable-pip-version-check pillow==11.3.0
      - name: Découper et cataloguer les sprites
        run: python scripts/slice_assets.py
      - name: Enregistrer les sprites individuels
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'solenne-build-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add official/assets/slices
          git commit -m 'assets: générer les sprites individuels de l étape 2 [skip ci]'
          git push origin HEAD:develop
      - uses: actions/upload-artifact@v4
        with:
          name: solenne-sliced-assets
          path: official/assets/slices
