name: Finaliser la fondation officielle

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'scripts/finalize-step1.mjs'
      - 'release/0.7/**'
      - 'src/**'
      - 'index.html'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'vercel.json'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Utiliser Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Reconstruire la base et les atlas
        run: node scripts/finalize-step1.mjs

      - name: Vérifier la syntaxe du moteur
        run: node --check official/src/game.js

      - name: Enregistrer le résultat reproductible
        run: |
          if git diff --quiet; then
            echo 'Aucun fichier généré à enregistrer.'
            exit 0
          fi
          git config user.name 'solenne-build-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add official docs/STEP1_COMPLETE.md tests/step1-final-report.json
          git commit -m 'build: finaliser la fondation et les atlas de l étape 1 [skip ci]'
          git push origin HEAD:develop

      - name: Publier l’audit comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: step1-foundation-audit
          path: |
            tests/step1-final-report.json
            docs/STEP1_COMPLETE.md
            official/assets/generated/manifest.json
