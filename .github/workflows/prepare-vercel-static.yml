name: Prepare validated Vercel static release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: solenne-vercel-static-main
  cancel-in-progress: true

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install validation dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Rebuild and validate the release
        run: |
          npm run check
          npm run test:repro
          npm run build
          npm run build:standalone
          npm run test:mobile

      - name: Verify all machine reports are green
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          reports = [
              Path("docs/ASSET_AUDIT.json"),
              Path("tests/reproducibility-report.json"),
              Path("tests/static-report.json"),
              Path("tests/mobile-qa-report.json"),
          ]
          failed = []
          for path in reports:
              data = json.loads(path.read_text(encoding="utf-8"))
              print(f"{path}: {data.get('status')}")
              if data.get("status") != "PASS":
                  failed.append(str(path))
          if failed:
              raise SystemExit("Rapports en échec : " + ", ".join(failed))
          PY

      - name: Assemble the tracked Vercel output
        run: |
          rm -rf public
          mkdir -p public
          cp -R dist/. public/
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "sourceCommit": os.environ["GITHUB_SHA"],
              "sourceBranch": "main",
              "workflow": "Prepare validated Vercel static release",
              "version": "1.2.0-alpha.1",
              "validation": "PASS",
          }
          Path("public/vercel-release.json").write_text(
              json.dumps(payload, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          test -s public/index.html
          test -s public/src/game.js
          test -s public/assets/hero.png
          test -s public/assets/map-base.png

      - name: Commit the validated static output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public
          if git diff --cached --quiet; then
            echo "The tracked Vercel output is already current."
          else
            git commit -m "build: préparer la release statique Vercel validée [skip ci]"
            git push origin HEAD:main
          fi
