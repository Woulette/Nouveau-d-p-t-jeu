name: Fondation étape 1

on:
  push:
    branches: [stage1-break-loop-5, develop]
    paths:
      - 'stage1/**'
      - '.github/workflows/stage1-foundation.yml'
  pull_request:
    paths:
      - 'stage1/**'

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stage1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
