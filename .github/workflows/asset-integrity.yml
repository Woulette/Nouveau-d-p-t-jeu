name: Contrôler les assets pixel art

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - 'official/assets/**'
      - 'tools/asset-gallery.html'
      - 'scripts/check-assets.mjs'
      - '.github/workflows/asset-integrity.yml'

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Vérifier les PNG, dimensions et sommes de contrôle
        run: node scripts/check-assets.mjs
      - name: Enregistrer le rapport
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'solenne-build-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add tests/asset-integrity-report.json
          git commit -m 'test: enregistrer l intégrité des assets [skip ci]'
          git push origin HEAD:develop
      - uses: actions/upload-artifact@v4
        with:
          name: asset-integrity-report
          path: tests/asset-integrity-report.json
